version: 2
updates:
  # npm dependencies. Group the low-risk updates into a single PR each, but leave MAJOR
  # bumps as individual PRs so a human (and the CI gate) reviews them — a blind major bump
  # of vue/axios is exactly what broke this repo before.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dev-minor-patch:
        dependency-type: development
        update-types: [minor, patch]
      prod-minor-patch:
        dependency-type: production
        update-types: [minor, patch]

  # Keep the GitHub Actions we depend on current.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  # Base image for the dev sandbox.
  - package-ecosystem: docker
    directory: "/docker"
    schedule:
      interval: weekly
