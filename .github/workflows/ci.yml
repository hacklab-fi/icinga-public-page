name: CI

# Gate every PR on a clean lint + build, so a breaking dependency bump (the failure mode
# that started all this) can never be green-merged unchecked.
on:
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - run: npm run lint:check
      - run: npm run build
